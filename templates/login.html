{% extends "layout.html" %}

{% block navtabs %}
    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
            <a class="nav-link" href="https://github.com/2Sn00py4u/S3cN0te">
                <img src="{{ url_for('static', filename='assets/icons/github/GitHub_Invertocat_White.png') }}" alt="Logo" width="24" height="24" class="d-inline-block align-text-bottom">
                GitHub
            </a>
        </li>
    </ul>
    <ul class="navbar-nav">
        <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/login">Login</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-i18n="navRegister" href="/register"></a>
        </li>
        <li class="nav-item" style="margin-left: 2%;">
            <a class="nav-link" data-i18n="lang" id="langSwitch"></a>
        </li>
    </ul>
{% endblock navtabs %}

{% block content %}
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div data-bs-theme="dark" style="min-width: 40%; max-width: 50%; color: #fffcf8; box-shadow: 0 0 15px #f0f8ff; background-color: #212529; padding: 2rem; border-radius: 10px;">
            <div class="container-md" name="login-header" style="padding-bottom: 6%;">
                <h2>Login</h2>
            </div>
            <div class="container-md" name="login-form">
                <form id="loginForm">
                    <div class="mb-3 input-group-lg">
                        <label for="login_unameInput" data-i18n="UsernameLabel" class="form-label"></label>
                        <input type="text" class="form-control" id="login_unameInput" required>
                    </div>
                    <div class="mb-3 input-group-lg">
                        <label for="login_passwdInput" data-i18n="PasswordLabel" class="form-label"></label>
                        <input type="password" class="form-control" id="login_passwdInput" required>
                    </div>
                    <div class="mb-3 form-check">
                        <a href="/register" data-i18n="loginRegisterSwitch"></a>
                    </div>
                    <div class="d-flex justify-content-end" style="margin-top: 4%;">
                        <button type="submit" class="btn btn-outline-primary btn-lg submitbutton" id="loginButton">Login</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock content %}

{% block jscripts %}
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
    <script src="{{ url_for('static', filename='js/language.js') }}"></script>
{% endblock jscripts %}

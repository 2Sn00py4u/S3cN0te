{% extends "layout.html" %}

{% block csscripts %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/edit.css') }}">
{% endblock csscripts %}

{% block navtabs %}
    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
            <a class="nav-link" href="https://github.com/2Sn00py4u/S3cN0te">
                <img src="{{ url_for('static', filename='assets/icons/github/GitHub_Invertocat_White.png') }}" alt="Logo" width="24" height="24" class="d-inline-block align-text-bottom">
                GitHub
            </a>
        </li>
    </ul>
    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item" id="undo-btn">
            <a class="nav-link edit-lnk" href="#">
                <img src="{{ url_for('static', filename='assets/icons/application/undo.png') }}" alt="Logo" width="24" height="24" class="d-inline-block align-text-bottom">
            </a>
        </li>
        <li class="nav-item edit-lnk" id="redo-btn">
            <a class="nav-link" href="#">
                <img src="{{ url_for('static', filename='assets/icons/application/redo.png') }}" alt="Logo" width="24" height="24" class="d-inline-block align-text-bottom">
            </a>
        </li>
        <li class="nav-item edit-lnk" id="add-page-btn">
            <a class="nav-link" href="#">
                <img src="{{ url_for('static', filename='assets/icons/application/addPage.png') }}" alt="Logo" width="24" height="24" class="d-inline-block align-text-bottom">
            </a>
        </li>
        <li class="nav-item edit-lnk" id="remove-page-btn">
            <a class="nav-link" href="#">
                <img src="{{ url_for('static', filename='assets/icons/application/delete.png') }}" alt="Logo" width="22" height="22" class="d-inline-block align-text-bottom">
            </a>
        </li>
    </ul>
    <ul class="navbar-nav">
        <li class="nav-item">
            <a class="nav-link" href="/user" data-i18n="navUser"></a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/logout">Logout</a>
        </li>
        <li class="nav-item" style="margin-left: 2%;">
            <a class="nav-link" data-i18n="lang" id="langSwitch"></a>
        </li>
    </ul>
{% endblock navtabs %}

{% block content %}
    <div style="display: flex; height: 100vh;">
        <div data-bs-theme="dark" class="menu-frame">
            <div class="list-group list-group-horizontal fakelink" style="width: 95%; flex-shrink: 0;">
                <a class="list-group-item" data-bs-toggle="modal" data-bs-target="#saveModal">
                    <img src="{{ url_for('static', filename='assets/icons/application/download.png') }}" alt="Logo" width="50px" height="50px">
                </a>
                <a class="list-group-item" data-bs-toggle="modal" data-bs-target="#saveModal">
                    <div class="d-flex w-100 justify-content-between">
                        <h5 class="mb-1" data-i18n="sideSaveHeader"></h5>
                    </div>
                    <p class="mb-1" data-i18n="sideSaveBody"></p>
                </a>
            </div>
            <div id="convert-pdf-btn" class="list-group list-group-horizontal fakelink" style="width: 95%; flex-shrink: 0;">
                <a class="list-group-item">
                    <img src="{{ url_for('static', filename='assets/icons/application/downloadPDF.png') }}" alt="Logo" width="50px" height="50px">
                </a>
                <a class="list-group-item">
                    <div class="d-flex w-100 justify-content-between">
                        <h5 class="mb-1" data-i18n="sidePDFHeader"></h5>
                    </div>
                    <p class="mb-1" data-i18n="sidePDFBody"></p>
                </a>
            </div>
            <div id="convert-img-btn" class="list-group list-group-horizontal fakelink" style="width: 95%; flex-shrink: 0;">
                <a class="list-group-item">
                    <img src="{{ url_for('static', filename='assets/icons/application/downloadPNG.png') }}" alt="Logo" width="50px" height="50px">
                </a>
                <a class="list-group-item">
                    <div class="d-flex w-100 justify-content-between">
                        <h5 class="mb-1" data-i18n="sidePNGHeader"></h5>
                    </div>
                    <p class="mb-1" data-i18n="sidePNGBody"></p>
                </a>
            </div>
            <div class="list-group list-group-horizontal fakelink" style="width: 95%; flex-shrink: 0;">
                <a href="https://github.com/2Sn00py4u/S3cN0te/blob/main/CreateSecNotes.md" class="list-group-item">
                    <img src="{{ url_for('static', filename='assets/icons/github/GitHub_Invertocat_White.png') }}" alt="Logo" width="50px" height="50px">
                </a>
                <a href="https://github.com/2Sn00py4u/S3cN0te/blob/main/CreateSecNotes.md" class="list-group-item">
                    <div class="d-flex w-100 justify-content-between">
                        <h5 class="mb-1" data-i18n="sideHelpHeader"></h5>
                    </div>
                    <p class="mb-1" data-i18n="sideHelpBody"></p>
                </a>
            </div>
            <div class="list-group list-group-horizontal" style="width: 95%; flex-shrink: 0; background-color: transparent; border-color: transparent;">
                <div id="loader">
                    
                </div>
            </div>
        </div>
        <div id="page-frame">
        </div>
    </div>
    {% raw %}
    <script id="page-template" type="text/template">
        <div id="page-{{page_id}}" data-bs-theme="dark" class="page" contenteditable="true"> 
        </div>
    </script>
    {% endraw %}^

    <!-- Modal -->
    <div class="modal fade" id="saveModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true" data-bs-theme="dark" style="color: #fffcf8;">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="saveModalLabel" data-i18n="modalSaveHeader"></h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3 input-group-lg">
                    <label for="fileNameInput" class="form-label">Name</label>
                    <input type="text" class="form-control" id="fileNameInput" placeholder="a-z, A-Z, 0-9, -_" required>
                </div>
                <div class="mb-3 input-group-lg">
                    <label for="encKeyInput" class="form-label" data-i18n="modalSaveKey"></label>
                    <input type="text" class="form-control" id="encKeyInput" placeholder="a-z, A-Z, 0-9, _" required>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="modalSaveCancel"></button>
                <button type="button" class="btn btn-primary disabled" id="saveButton" data-i18n="modalSaveSave"></button>
            </div>
        </div>
    </div>
{% endblock content %}

{% block jscripts %}
    <script src="{{ url_for('static', filename='js/marked.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/edit.js') }}"></script>
{% endblock jscripts %}
